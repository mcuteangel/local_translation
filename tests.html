<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تست‌های واحد - ابزار ترجمه محلی</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
  <style>
    * { font-family: 'Vazirmatn', system-ui, sans-serif; }
    .pass { background-color: #d1fae5; border-color: #6ee7b7; }
    .fail { background-color: #fee2e2; border-color: #fca5a5; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #f1f5f9; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <div>
        <h1 class="text-lg font-bold text-slate-800">🧪 تست‌های واحد</h1>
        <p class="text-xs text-slate-500">ابزار ترجمه محلی</p>
      </div>
      <div class="flex items-center gap-3 text-xs">
        <span id="total-tests" class="text-slate-500">۰ تست</span>
        <span id="passed-tests" class="text-emerald-600 font-medium">۰ قبول</span>
        <span id="failed-tests" class="text-red-600 font-medium">۰ رد</span>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto p-4">
    <div class="flex gap-2 mb-4">
      <button id="run-all-btn" class="px-4 py-2 bg-emerald-600 text-white text-sm rounded-lg hover:bg-emerald-700">اجرای همه تست‌ها</button>
      <button id="clear-results-btn" class="px-4 py-2 bg-slate-200 text-slate-600 text-sm rounded-lg hover:bg-slate-300">پاک کردن نتایج</button>
    </div>
    <div id="test-results" class="space-y-2"></div>
  </main>

  <script>
    // ===== Test Framework =====
    let tests = [];
    let passed = 0;
    let failed = 0;

    function test(name, fn) {
      tests.push({ name, fn });
    }

    function assertEqual(actual, expected, msg = '') {
      const pass = JSON.stringify(actual) === JSON.stringify(expected);
      if (!pass) {
        throw new Error(`${msg}\n  Expected: ${JSON.stringify(expected)}\n  Actual: ${JSON.stringify(actual)}`);
      }
    }

    function assertTrue(value, msg = '') {
      if (!value) throw new Error(msg || 'Expected true, got ' + JSON.stringify(value));
    }

    function assertFalse(value, msg = '') {
      if (value) throw new Error(msg || 'Expected false, got ' + JSON.stringify(value));
    }

    // ===== Utility Functions (copied from main app) =====
    
    function flattenJSON(obj, prefix = '') {
      const result = {};
      for (const key in obj) {
        const newKey = prefix ? `${prefix}.${key}` : key;
        if (typeof obj[key] === 'object' && obj[key] !== null && !Array.isArray(obj[key])) {
          Object.assign(result, flattenJSON(obj[key], newKey));
        } else {
          result[newKey] = obj[key];
        }
      }
      return result;
    }

    function unflattenJSON(flat) {
      const result = {};
      for (const key in flat) {
        const keys = key.split('.');
        let current = result;
        for (let i = 0; i < keys.length - 1; i++) {
          if (!current[keys[i]]) {
            const nextKey = keys[i + 1];
            current[keys[i]] = !isNaN(parseInt(nextKey)) ? [] : {};
          }
          current = current[keys[i]];
        }
        current[keys[keys.length - 1]] = flat[key];
      }
      return result;
    }

    function detectFileType(filename) {
      const ext = filename.toLowerCase();
      if (ext.endsWith('.xml')) return 'xml';
      if (ext.endsWith('.yaml') || ext.endsWith('.yml')) return 'yaml';
      if (ext.endsWith('.properties')) return 'properties';
      if (ext.endsWith('.csv')) return 'csv';
      if (ext.endsWith('.ini')) return 'ini';
      if (ext.endsWith('.po')) return 'po';
      return 'json';
    }

    function isXMLContent(content) {
      return content.trim().startsWith('<?xml') || content.trim().startsWith('<resources');
    }

    function parseXML(content) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(content, 'text/xml');
      const resources = doc.querySelector('resources');
      if (!resources) throw new Error('Invalid XML');
      const flat = {};
      const strings = resources.querySelectorAll('string');
      strings.forEach(str => {
        const name = str.getAttribute('name');
        flat[name] = str.textContent || '';
      });
      return { flat, metadata: [] };
    }

    function parseProperties(content) {
      const flat = {};
      const lines = content.split('\n');
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('!')) continue;
        const equalIndex = trimmed.indexOf('=');
        if (equalIndex > 0) {
          flat[trimmed.substring(0, equalIndex).trim()] = trimmed.substring(equalIndex + 1).trim();
        }
      }
      return { flat, metadata: [] };
    }

    function parseYAML(content) {
      const flat = {};
      const lines = content.split('\n');
      const stack = [{ keys: [], indent: -1 }];
      
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (!line.trim() || line.trim().startsWith('#') || line.trim().startsWith('---')) continue;
        
        const match = line.match(/^(\s*)([^:#]+):\s*(.*)$/);
        if (match) {
          const indent = match[1].length;
          const key = match[2].trim();
          const value = match[3].trim();
          
          while (stack.length > 1 && stack[stack.length - 1].indent >= indent) stack.pop();
          
          const parentKeys = stack[stack.length - 1].keys;
          const fullKey = [...parentKeys, key].join('.');
          
          if (value === '' || value === '|' || value === '> ') {
            stack.push({ keys: [...parentKeys, key], indent });
          } else {
            let cleanValue = value;
            if ((value.startsWith('"') && value.endsWith('"')) || 
                (value.startsWith("'") && value.endsWith("'"))) {
              cleanValue = value.slice(1, -1);
            }
            flat[fullKey] = cleanValue;
          }
        }
      }
      return { flat, metadata: [] };
    }

    function parseCSV(content) {
      const flat = {};
      const lines = content.split('\n');
      if (lines.length < 2) return { flat, metadata: [] };
      
      const firstLine = lines[0];
      let sep = ',';
      if (firstLine.includes('\t')) sep = '\t';
      else if (firstLine.includes(';')) sep = ';';
      
      const headers = firstLine.split(sep).map(h => h.trim().replace(/^["']|["']$/g, ''));
      
      // Detect if first line is a header row (exact whole-word match to avoid false positives)
      const isHeaderRow = headers.some(h => /^(key|id|name|value|text|translation|کلید|مقدار|ترجمه)$/i.test(h.trim()));
      
      if (!isHeaderRow) {
        // No header row — treat every line as key,value
        for (let i = 0; i < lines.length; i++) {
          const parts = lines[i].split(sep);
          if (parts.length > 0 && parts[0].trim()) {
            const key = parts[0].trim().replace(/^["']|["']$/g, '');
            if (key) flat[key] = parts.length > 1 ? parts.slice(1).join(sep).trim().replace(/^["']|["']$/g, '') : '';
          }
        }
      } else {
        const keyCol = headers.findIndex(h => /^(key|id|name|کلید)$/i.test(h.trim()));
        const valueCol = headers.findIndex(h => /^(value|text|translation|مقدار|ترجمه)$/i.test(h.trim()));
        if (keyCol === -1) {
          // Fallback: first column is key
          for (let i = 1; i < lines.length; i++) {
            const parts = lines[i].split(sep);
            if (parts.length > 0 && parts[0].trim()) {
              const key = parts[0].trim().replace(/^["']|["']$/g, '');
              if (key) flat[key] = parts.length > 1 ? parts.slice(1).join(sep).trim().replace(/^["']|["']$/g, '') : '';
            }
          }
        } else {
          for (let i = 1; i < lines.length; i++) {
            const parts = lines[i].split(sep);
            if (parts.length <= keyCol) continue;
            const key = parts[keyCol].trim().replace(/^["']|["']$/g, '');
            if (!key) continue;
            flat[key] = valueCol >= 0 && parts[valueCol] ? parts[valueCol].trim().replace(/^["']|["']$/g, '') : '';
          }
        }
      }
      return { flat, metadata: [] };
    }

    function parseINI(content) {
      const flat = {};
      let currentSection = '';
      const lines = content.split('\n');
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith(';')) continue;
        const sectionMatch = trimmed.match(/^\[(.+)\]$/);
        if (sectionMatch) { currentSection = sectionMatch[1].trim(); continue; }
        const equalIndex = trimmed.indexOf('=');
        if (equalIndex > 0) {
          let key = trimmed.substring(0, equalIndex).trim();
          const value = trimmed.substring(equalIndex + 1).trim();
          if (currentSection) key = `${currentSection}.${key}`;
          flat[key] = value;
        }
      }
      return { flat, metadata: [] };
    }

    function parsePO(content) {
      const flat = {};
      const lines = content.split('\n');
      let currentMsgid = '', currentMsgstr = '', inMsgid = false, inMsgstr = false;
      
      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.startsWith('msgid ')) {
          if (currentMsgid && currentMsgstr) flat[currentMsgid] = currentMsgstr;
          const match = trimmed.match(/^msgid\s+"(.+)"$/);
          currentMsgid = match ? match[1] : '';
          currentMsgstr = '';
          inMsgid = true; inMsgstr = false;
        } else if (trimmed.startsWith('msgstr ')) {
          const match = trimmed.match(/^msgstr\s+"(.+)"$/);
          currentMsgstr = match ? match[1] : '';
          inMsgid = false; inMsgstr = true;
        } else if (inMsgid && trimmed.startsWith('"')) {
          const match = trimmed.match(/^"(.+)"$/);
          if (match) currentMsgid += match[1];
        } else if (inMsgstr && trimmed.startsWith('"')) {
          const match = trimmed.match(/^"(.+)"$/);
          if (match) currentMsgstr += match[1];
        }
      }
      if (currentMsgid && currentMsgstr) flat[currentMsgid] = currentMsgstr;
      return { flat, metadata: [] };
    }

    function extractSpecialChars(text) {
      if (typeof text !== 'string' || text === '') return [];
      const patterns = [/%(\d\$)?[dDfFsScCboxXeEgGaAnNhHtT]/g, /\{(\d+)\}/g];
      const results = [];
      for (const pattern of patterns) {
        let match;
        while ((match = pattern.exec(text)) !== null) {
          if (!results.includes(match[0])) results.push(match[0]);
        }
      }
      return results;
    }

    // ===== Test Cases =====

    // --- Format Detection Tests ---
    test('شناسایی فایل JSON', () => {
      assertEqual(detectFileType('en.json'), 'json');
      assertEqual(detectFileType('messages.json'), 'json');
    });

    test('شناسایی فایل XML', () => {
      assertEqual(detectFileType('strings.xml'), 'xml');
    });

    test('شناسایی فایل YAML', () => {
      assertEqual(detectFileType('en.yaml'), 'yaml');
      assertEqual(detectFileType('en.yml'), 'yaml');
    });

    test('شناسایی فایل Properties', () => {
      assertEqual(detectFileType('messages.properties'), 'properties');
    });

    test('شناسایی فایل CSV', () => {
      assertEqual(detectFileType('translations.csv'), 'csv');
    });

    test('شناسایی فایل INI', () => {
      assertEqual(detectFileType('config.ini'), 'ini');
    });

    test('شناسایی فایل PO', () => {
      assertEqual(detectFileType('messages.po'), 'po');
    });

    // --- JSON Flatten/Unflatten Tests ---
    test('Flat کردن JSON تو در تو', () => {
      const input = { a: { b: 'c', d: 'e' }, f: 'g' };
      const result = flattenJSON(input);
      assertEqual(result, { 'a.b': 'c', 'a.d': 'e', f: 'g' });
    });

    test('Unflat کردن JSON', () => {
      const input = { 'a.b': 'c', 'a.d': 'e', f: 'g' };
      const result = unflattenJSON(input);
      assertEqual(result, { a: { b: 'c', d: 'e' }, f: 'g' });
    });

    test('Flat کردن JSON خالی', () => {
      assertEqual(flattenJSON({}), {});
    });

    test('Unflat کردن JSON خالی', () => {
      assertEqual(unflattenJSON({}), {});
    });

    // --- XML Parsing Tests ---
    test('پارس XML ساده', () => {
      const xml = `<?xml version="1.0" encoding="utf-8"?>
        <resources>
          <string name="app_name">My App</string>
          <string name="welcome">Welcome</string>
        </resources>`;
      const result = parseXML(xml);
      assertEqual(result.flat, { app_name: 'My App', welcome: 'Welcome' });
    });

    test('شناسایی محتوای XML', () => {
      assertTrue(isXMLContent('<?xml version="1.0"?><resources></resources>'));
      assertTrue(isXMLContent('<resources><string name="a">b</string></resources>'));
      assertFalse(isXMLContent('{"key": "value"}'));
    });

    // --- Properties Parsing Tests ---
    test('پارس Properties ساده', () => {
      const content = 'app.name=My App\nwelcome.message=Hello\n# comment\ndb.host=localhost';
      const result = parseProperties(content);
      assertEqual(result.flat, { 'app.name': 'My App', 'welcome.message': 'Hello', 'db.host': 'localhost' });
    });

    test('پارس Properties با کاراکترهای خاص', () => {
      const content = 'path=C:\\Program Files\\App\nescaped=test\\=value';
      const result = parseProperties(content);
      assertEqual(result.flat.path, 'C:\\Program Files\\App');
    });

    // --- YAML Parsing Tests ---
    test('پارس YAML ساده', () => {
      const yaml = 'app:\n  name: My App\n  version: "1.0"\ndebug: true';
      const result = parseYAML(yaml);
      assertEqual(result.flat['app.name'], 'My App');
      assertEqual(result.flat['app.version'], '1.0');
    });

    // --- CSV Parsing Tests ---
    test('پارس CSV با هدر', () => {
      const csv = 'key,value\napp_name,My App\nwelcome,Hello\n';
      const result = parseCSV(csv);
      assertEqual(result.flat, { app_name: 'My App', welcome: 'Hello' });
    });

    test('پارس CSV بدون هدر', () => {
      const csv = 'app_name,My App\nwelcome,Hello\n';
      const result = parseCSV(csv);
      assertEqual(result.flat, { app_name: 'My App', welcome: 'Hello' });
    });

    // --- INI Parsing Tests ---
    test('پارس INI ساده', () => {
      const ini = '[app]\nname=My App\nversion=1.0\n[database]\nhost=localhost';
      const result = parseINI(ini);
      assertEqual(result.flat, { 'app.name': 'My App', 'app.version': '1.0', 'database.host': 'localhost' });
    });

    test('پارس INI با کامنت', () => {
      const ini = '# comment\n[section]\n; another comment\nkey=value';
      const result = parseINI(ini);
      assertEqual(result.flat, { 'section.key': 'value' });
    });

    // --- PO Parsing Tests ---
    test('پارس PO ساده', () => {
      const po = 'msgid "app_name"\nmsgstr "My App"\n\nmsgid "welcome"\nmsgstr "Welcome"\n';
      const result = parsePO(po);
      assertEqual(result.flat, { app_name: 'My App', welcome: 'Welcome' });
    });

    test('پارس PO چند خطه', () => {
      const po = 'msgid "long_message"\nmsgstr "This is a\\n"\n"long message"\n';
      const result = parsePO(po);
      assertEqual(result.flat, { long_message: 'This is a\\nlong message' });
    });

    // --- Special Characters Extraction Tests ---
    test('استخراج %s و %d', () => {
      const text = 'Hello %s, you have %d messages';
      const chars = extractSpecialChars(text);
      assertTrue(chars.includes('%s'));
      assertTrue(chars.includes('%d'));
    });

    test('استخراج {0} و {1}', () => {
      const text = 'Hello {0}, welcome to {1}';
      const chars = extractSpecialChars(text);
      assertTrue(chars.includes('{0}'));
      assertTrue(chars.includes('{1}'));
    });

    test('استخراج از متن خالی', () => {
      assertEqual(extractSpecialChars(''), []);
    });

    test('استخراج از متن بدون کاراکتر خاص', () => {
      assertEqual(extractSpecialChars('Hello World'), []);
    });

    test('استخراج ترکیبی', () => {
      const text = '%s and {0} and %d';
      const chars = extractSpecialChars(text);
      ['%s', '{0}', '%d'].forEach(c => assertTrue(chars.includes(c), `Missing ${c}`));
    });

    // --- Edge Cases ---
    test('پارس JSON با آرایه', () => {
      const input = { colors: ['red', 'green', 'blue'] };
      const flat = flattenJSON(input);
      assertEqual(flat, { colors: ['red', 'green', 'blue'] });
    });

    test('پارس JSON با مقدار null', () => {
      const input = { key: null };
      const flat = flattenJSON(input);
      assertEqual(flat, { key: null });
    });

    test('پارس JSON با مقدار عددی', () => {
      const input = { count: 42, price: 19.99 };
      const flat = flattenJSON(input);
      assertEqual(flat, { count: 42, price: 19.99 });
    });

    test('پارس Properties با خط خالی', () => {
      const content = 'key1=value1\n\nkey2=value2\n\n\nkey3=value3';
      const result = parseProperties(content);
      assertEqual(Object.keys(result.flat).length, 3);
    });

    test('تشخیص فایل با پسوند ناشناخته', () => {
      assertEqual(detectFileType('file.txt'), 'json');
      assertEqual(detectFileType('file'), 'json');
      assertEqual(detectFileType('file.TXT'), 'json');
    });

    // --- Unflatten with nested objects ---
    test('Unflat کردن ساختار سه سطحی', () => {
      const input = { 'a.b.c': 'deep', 'a.b.d': 'also deep', x: 'shallow' };
      const result = unflattenJSON(input);
      assertEqual(result, { a: { b: { c: 'deep', d: 'also deep' } }, x: 'shallow' });
    });

    // --- YAML with quoted values ---
    test('پارس YAML با مقادیر نقل قول شده', () => {
      const yaml = 'key1: "value with spaces"\nkey2: \'single quoted\'';
      const result = parseYAML(yaml);
      assertEqual(result.flat.key1, 'value with spaces');
      assertEqual(result.flat.key2, 'single quoted');
    });

    // ===== Test Runner =====
    async function runTests() {
      const container = document.getElementById('test-results');
      container.innerHTML = '<p class="text-slate-400 text-sm text-center py-4">در حال اجرای تست‌ها...</p>';
      
      passed = 0;
      failed = 0;
      
      for (const t of tests) {
        let status = 'pass';
        let errorMsg = '';
        
        try {
          await t.fn();
          passed++;
        } catch (e) {
          status = 'fail';
          errorMsg = e.message;
          failed++;
        }
        
        const div = document.createElement('div');
        div.className = `rounded-lg border px-4 py-3 ${status === 'pass' ? 'pass' : 'fail'}`;
        div.innerHTML = `
          <div class="flex items-center gap-2">
            <span class="text-lg">${status === 'pass' ? '✅' : '❌'}</span>
            <span class="text-sm font-medium text-slate-800">${t.name}</span>
            <span class="mr-auto text-xs px-2 py-0.5 rounded-full ${status === 'pass' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}">${status === 'pass' ? 'قبول' : 'رد'}</span>
          </div>
          ${errorMsg ? `<div class="mt-2 text-xs text-red-600 bg-red-50 rounded p-2 font-mono whitespace-pre-wrap">${errorMsg}</div>` : ''}
        `;
        container.appendChild(div);
      }
      
      document.getElementById('total-tests').textContent = `${tests.length} تست`;
      document.getElementById('passed-tests').textContent = `${passed} قبول`;
      document.getElementById('failed-tests').textContent = `${failed} رد`;
      
      if (failed === 0) {
        const successDiv = document.createElement('div');
        successDiv.className = 'rounded-lg border border-emerald-300 bg-emerald-50 px-4 py-3 text-center';
        successDiv.innerHTML = '<span class="text-emerald-700 font-medium">🎉 همه تست‌ها با موفقیت گذرانده شدند!</span>';
        container.prepend(successDiv);
      }
    }

    // ===== Initialize =====
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('run-all-btn').addEventListener('click', runTests);
      document.getElementById('clear-results-btn').addEventListener('click', () => {
        document.getElementById('test-results').innerHTML = '';
        document.getElementById('total-tests').textContent = '۰ تست';
        document.getElementById('passed-tests').textContent = '۰ قبول';
        document.getElementById('failed-tests').textContent = '۰ رد';
      });
      
      // Auto-run on load
      runTests();
    });
  </script>
</body>
</html>
